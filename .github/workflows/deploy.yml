name: Deploy to Cloudflare Workers

# Auto-deploy on every push to main. Without this, merging a PR ships nothing
# and corpus.aynu.org silently drifts behind main until someone runs
# `wrangler deploy` by hand.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys so two pushes cannot race the same custom domain.
concurrency:
  group: cf-workers-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    # CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID are environment-scoped; the
    # job must opt in to the "deploy" Environment for them to be injected.
    # DATABASE_URL / DATABASE_AUTH_TOKEN are Worker secrets held at Cloudflare
    # (`wrangler secret put`) and are not needed here.
    environment: deploy
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test
      - run: bun run typecheck
      - run: bunx wrangler deploy
