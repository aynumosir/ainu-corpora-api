<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>aynu kampisos hunara — Ainu corpus search</title>
<style>
  :root {
    --bg: #fbfaf7; --panel: #ffffff; --ink: #1c1a17; --muted: #6b645a;
    --line: #e7e2d8; --accent: #b4532a; --accent-soft: #f3e2d8;
    --node-bg: #fde9b8; --node-ink: #5a3a00; --link: #9c4a23;
    --chip: #f0ece2; --pos: #2f6f6a; --pos-bg: #e3efed; --bar: #d9b48f;
    --mono: "DejaVu Sans Mono", ui-monospace, "Cascadia Code", Menlo, monospace;
    --ui: system-ui, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16140f; --panel: #1f1c16; --ink: #ece7dd; --muted: #9a9285;
      --line: #322d24; --accent: #e08a5b; --accent-soft: #2c211a;
      --node-bg: #4a3a18; --node-ink: #ffe6a8; --link: #e6a072;
      --chip: #2a261e; --pos: #8fd0c8; --pos-bg: #1d2a28; --bar: #6b4f30;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--ui); line-height: 1.5; }
  header { padding: 16px 22px 12px; border-bottom: 1px solid var(--line); }
  h1 { margin: 0; font-size: 18px; font-weight: 650; letter-spacing: .2px; }
  h1 small { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 22px; }
  form { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 14px 0 4px; }
  input[type=text], select { font: inherit; padding: 8px 10px; background: var(--panel);
    color: var(--ink); border: 1px solid var(--line); border-radius: 8px; }
  input#q { flex: 1 1 320px; min-width: 240px; font-size: 15px; padding: 10px 14px; font-family: var(--mono); }
  input.sm { width: 90px; } select.sm { padding: 7px 8px; font-size: 13px; }
  .opt { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
  button.go { background: var(--accent); color: #fff; border: 0; border-radius: 8px; padding: 10px 20px; font: inherit; font-weight: 600; cursor: pointer; }
  button.ghost { background: var(--panel); color: var(--muted); border: 1px solid var(--line); border-radius: 8px; padding: 7px 12px; font: inherit; font-size: 12px; cursor: pointer; }
  button.ghost[aria-pressed=true] { color: var(--accent); border-color: var(--accent); }
  /* collapsed advanced options */
  details.opts { width: 100%; padding: 2px 0 0; }
  details.opts summary { cursor: pointer; color: var(--muted); font-size: 12px; width: fit-content;
    list-style: none; padding: 2px 0; }
  details.opts summary::before { content: "⚙ "; }
  details.opts summary::-webkit-details-marker { display: none; }
  details.opts .panel { display: flex; flex-wrap: wrap; gap: 12px; padding: 8px 0 4px; }
  /* result views (tabs) + toolbar */
  .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 6px 0;
    border-bottom: 1px solid var(--line); margin-top: 4px; }
  .toolbar[hidden] { display: none; }
  .tabs { display: flex; gap: 2px; margin-right: auto; }
  .tabs button { border: 0; background: none; color: var(--muted); padding: 5px 10px; font: inherit;
    font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tabs button[aria-selected=true] { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .examples { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0; }
  .examples .ex { background: var(--chip); border: 1px solid var(--line); border-radius: 999px;
    padding: 4px 11px; font-size: 12.5px; cursor: pointer; color: var(--ink); font-family: var(--mono); }
  .examples .ex:hover { border-color: var(--accent); }
  .examples .ex b { font-weight: 600; }
  .examples .ex .exl { color: var(--muted); font-family: var(--ui); font-size: 11px; margin-left: 6px; }
  .hint { color: var(--muted); font-size: 12px; padding: 2px 0 8px; font-family: var(--mono); }
  .status { color: var(--muted); font-size: 13px; padding: 6px 0; min-height: 18px; }
  .pager { display: flex; gap: 8px; align-items: center; padding: 4px 0; }
  .hits { padding-bottom: 60px; }
  .hit { border-bottom: 1px solid var(--line); padding: 9px 4px; }
  /* Token-grid KWIC */
  .kwic { display: grid; grid-template-columns: 1fr auto 1fr; align-items: baseline;
    font-family: var(--mono); font-size: 14.5px; column-gap: 8px; }
  /* Clip BOTH axes explicitly. If only overflow-x is set to hidden, CSS
     computes overflow-y to `auto`, which turns these cells into scroll
     containers and shows a spurious vertical scrollbar (most visible in
     POS/gloss mode, where each token carries a second gloss line). */
  .kwic .l { text-align: right; white-space: nowrap; overflow: hidden; }
  .kwic .r { text-align: left; white-space: nowrap; overflow: hidden; }
  .kwic .n { background: var(--node-bg); color: var(--node-ink); padding: 1px 5px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
  .tok { cursor: pointer; padding: 0 1px; border-radius: 3px; }
  .tok:hover { background: var(--accent-soft); }
  /* Homograph: this surface has other attested readings (see tooltip / gloss). */
  .tok.has-alt { text-decoration: underline dotted var(--bar); text-underline-offset: 2px; }
  .tok .g .alt { display: none; color: var(--muted); font-size: 8.5px; font-style: italic; }
  body.gloss .tok.has-alt .g .alt { display: block; }
  .tok .g { display: none; font-family: var(--ui); font-size: 9.5px; color: var(--pos); line-height: 1.1; }
  .tok .g .posline, .tok .g .gl { display: block; }
  .tok .gl { color: var(--muted); font-size: 9px; }
  /* Gloss mode: each token becomes a centered inline-block stack (surface over
     POS/lemma); columns wrap but each word's gloss stays under it. */
  body.gloss .tok { display: inline-block; vertical-align: top; text-align: center; }
  body.gloss .tok .g { display: block; }
  body.gloss .kwic .l, body.gloss .kwic .r { white-space: normal; overflow: visible; }
  .clitic { color: var(--accent); }
  .badge { font-family: var(--ui); font-size: 11px; color: var(--accent); border: 1px solid var(--line);
    background: var(--accent-soft); border-radius: 999px; padding: 1px 8px; margin-left: 8px; }
  .meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; padding-left: 2px; font-size: 12.5px; }
  .meta .tr { color: var(--muted); }
  .meta .src { color: var(--muted); margin-left: auto; }
  .meta .src a { color: var(--link); text-decoration: none; }
  .row-sent { font-family: var(--mono); font-size: 14.5px; }
  .empty { color: var(--muted); padding: 30px 4px; }
  /* Tables (collocates / distribution / forms) */
  table.data { border-collapse: collapse; width: 100%; font-size: 13.5px; margin-top: 6px; }
  table.data th, table.data td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--line); }
  table.data th { color: var(--muted); font-weight: 600; }
  table.data td.num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--mono); }
  table.data tr:hover td { background: var(--accent-soft); }
  .w { font-family: var(--mono); cursor: pointer; }
  .w:hover { color: var(--link); text-decoration: underline; }
  .pos-tag { color: var(--pos); background: var(--pos-bg); border-radius: 4px; padding: 0 5px; font-size: 11px; }
  .bar { height: 9px; background: var(--bar); border-radius: 3px; display: inline-block; vertical-align: middle; }
  .dist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 8px; }
  .dist-grid h3 { font-size: 13px; margin: 0 0 6px; color: var(--muted); }
  footer { color: var(--muted); font-size: 12px; padding: 18px 0 40px; border-top: 1px solid var(--line); }
  footer a { color: var(--link); }
  code { background: var(--accent-soft); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); font-size: 12px; }
  details.infl { margin: 4px 0 2px; font-size: 12.5px; color: var(--muted); }
  details.infl summary { cursor: pointer; }
  details.infl .form { display: inline-block; margin: 2px 8px 2px 0; }
  details.infl .form b { color: var(--accent); cursor: pointer; }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>aynu kampisos hunara <small>Ainu corpus search</small></h1>
</div></header>

<div class="wrap">
  <form id="f" autocomplete="off">
    <input type="text" id="q" placeholder="rayke · kamuy kor · pos:VERB · /ech?i/ · 神" autofocus>
    <button class="go" type="submit">Search</button>

    <details class="opts" id="opts"><summary id="opts-summary">Options</summary><div class="panel">
      <label class="opt">match
        <select id="match" class="sm">
          <option value="fold">accent-insensitive</option>
          <option value="exact">exact</option>
          <option value="prefix">prefix</option>
          <option value="regex">regex</option>
        </select></label>
      <label class="opt">expand
        <select id="expand" class="sm"><option value="none">none</option><option value="plural">+ plural</option><option value="all">+ all forms</option></select></label>
      <label class="opt">clitic
        <select id="clitic" class="sm"><option value="any">any</option><option value="only">only</option><option value="exclude">exclude</option></select></label>
      <label class="opt">dialect <input type="text" id="dialect" class="sm" placeholder="沙流"></label>
      <label class="opt">limit <input type="text" id="limit" class="sm" value="50" style="width:56px"></label>
      <label class="opt">±window <input type="text" id="window" class="sm" value="5" style="width:48px"></label>
      <label class="opt">span
        <select id="span" class="sm"><option value="both">both</option><option value="left">left</option><option value="right">right</option></select></label>
      <label class="opt">rank by
        <select id="measure" class="sm"><option value="log_dice">logDice</option><option value="t_score">t-score</option><option value="mi">MI</option></select></label>
    </div></details>
    <input type="hidden" id="offset" value="0">
  </form>

  <div class="toolbar" id="toolbar" hidden>
    <div class="tabs" id="tabs" role="tablist">
      <button type="button" data-view="contexts" aria-selected="true">Contexts</button>
      <button type="button" data-view="collocates">Collocates</button>
      <button type="button" data-view="distribution">Distribution</button>
      <button type="button" data-view="forms">Forms</button>
    </div>
    <label class="opt" id="o-sort">sort
      <select id="sort" class="sm">
        <option value="none">corpus order</option>
        <option value="l1">1 left</option><option value="l2">2 left</option><option value="l3">3 left</option>
        <option value="r1">1 right</option><option value="r2">2 right</option><option value="r3">3 right</option>
        <option value="node">node</option><option value="dialect">dialect</option><option value="author">author</option>
      </select></label>
    <button type="button" class="ghost" id="t-gloss" aria-pressed="false">POS/gloss</button>
    <button type="button" class="ghost" id="t-csv">CSV</button>
    <button type="button" class="ghost" id="t-json">JSON</button>
  </div>

  <div id="intro">
    <div class="examples" id="examples"></div>
    <div class="hint">word · phrase · /ech?i/ /^a/ word regex · pos:VERB lemma:arpa next:=an · [upos=NOUN] pattern · kamuy* prefix · "ramat" exact · 日本語 → translations</div>
  </div>
  <div id="infl"></div>
  <div class="status" id="status"></div>
  <div class="pager" id="pager"></div>
  <div class="hits" id="hits"></div>

  <footer>
    Data: <a href="https://github.com/aynumosir/ainu-corpora" target="_blank">ainu-corpora</a> ·
    API: <a href="https://github.com/aynumosir/ainu-corpora-api/blob/main/openapi.yaml" target="_blank">/v1</a> ·
    POS machine-tagged (UD) · forms from
    <a href="https://github.com/aynumosir/ainu-morpheme-database" target="_blank">ainu-morpheme-database</a>.
  </footer>
</div>

<script>
// Same-origin when served from the corpus host or any local dev server;
// otherwise (e.g. an embedded page on another origin) hit the public API.
const LOCAL = ["localhost", "127.0.0.1", "0.0.0.0", ""].includes(location.hostname);
const API = (location.hostname === "corpus.aynu.org" || LOCAL) ? "" : "https://corpus.aynu.org";
let view = "contexts";           // contexts | collocates | distribution | forms
let lastKind = "kwic";           // what the last query classified as
let lastRows = [], lastCols = null, lastDist = null;
const $ = (s) => document.querySelector(s);
const esc = (s) => (s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// ─── one box, four query kinds ───
// kwic     single word                    → concordance (+ word views)
// pos      pos:VERB lemma:arpa next:=an   → grammatical filter concordance
// pattern  several words or [upos=…]      → token-sequence search
// text     any CJK                        → full-text / translation search
const KIND_LABEL = { kwic: "", pos: "grammar filter", pattern: "pattern", text: "text search" };
function parseQuery(raw) {
  const out = { kind: "kwic", q: "", filters: {}, match: null };
  const rest = [];
  for (const tok of raw.trim().split(/\s+/).filter(Boolean)) {
    const m = tok.match(/^(pos|upos|lemma|next|dialect):(.+)$/i);
    if (m) out.filters[m[1].toLowerCase() === "pos" ? "upos" : m[1].toLowerCase()] = m[2];
    else rest.push(tok);
  }
  let q = rest.join(" ");
  if (/[぀-ヿ㐀-鿿豈-﫿ｦ-ﾟ]/.test(q)) return { ...out, kind: "text", q };
  // /ech?i/ — one word regex → KWIC match=regex. Several tokens with a /re/
  // among them fall through to the pattern kind (regex-slot sequence search).
  const rex = q.match(/^\/(.+)\/$/);
  if (rex && !/\s/.test(rex[1])) return { ...out, q: rex[1], match: "regex" };
  if (q.includes("[")) return { ...out, kind: "pattern", q };
  if (Object.keys(out.filters).some((k) => k !== "dialect")) return { ...out, kind: "pos", q };
  const quoted = q.match(/^"(.+)"$/);
  if (quoted) { out.match = "exact"; q = quoted[1]; }
  else if (q.endsWith("*")) { out.match = "prefix"; q = q.slice(0, -1); }
  if (q.split(/\s+/).filter(Boolean).length > 1) return { ...out, kind: "pattern", q };
  return { ...out, q };
}

function setView(v) {
  view = v;
  document.querySelectorAll("#tabs button").forEach((b) => b.setAttribute("aria-selected", b.dataset.view === v));
}
document.querySelectorAll("#tabs button").forEach((b) =>
  b.addEventListener("click", () => { setView(b.dataset.view); resetOffset(); run(); }));

async function getRaw(path) {
  const r = await fetch(API + path);
  const j = await r.json();
  if (j.error) throw new Error(j.error.code + ": " + j.error.message);
  return j; // { data, meta? }
}
async function get(path) { return (await getRaw(path)).data; }

// Pagination control (rendered for modes that return meta.total).
function renderPager(meta, shown) {
  const pg = $("#pager");
  if (!meta || !meta.total || meta.total <= shown && meta.offset === 0) { pg.innerHTML = ""; return; }
  const off = meta.offset || 0, lim = meta.limit || shown;
  const from = meta.total ? off + 1 : 0, to = off + shown;
  pg.innerHTML =
    `<button class="ghost" id="pg-prev"${off <= 0 ? " disabled" : ""}>‹ prev</button>
     <span class="opt">${from}–${to} of ${meta.total}</span>
     <button class="ghost" id="pg-next"${to >= meta.total ? " disabled" : ""}>next ›</button>`;
  $("#pg-prev")?.addEventListener("click", () => { $("#offset").value = Math.max(0, off - lim); run(); });
  $("#pg-next")?.addEventListener("click", () => { $("#offset").value = off + lim; run(); });
}
function resetOffset() { const o = $("#offset"); if (o) o.value = "0"; }
function done(msg) { $("#status").textContent = msg; }
function src(d) {
  const label = [d.dialect, d.author].filter(Boolean).join(" · ");
  return d.uri ? `<a href="${esc(d.uri)}" target="_blank">${esc(label || "source")}</a>` : esc(label);
}

// ─── examples (empty-state chips, from /v1/examples) ───
// The API's examples are per-endpoint; map each onto the one-box syntax so the
// chips both run AND teach the conventions.
function exampleState(e) {
  const p = e.params || {};
  switch (e.mode) {
    case "kwic": {
      let q = p.q || "";
      if (p.match === "prefix") q += "*";
      else if (p.match === "exact") q = `"${q}"`;
      else if (p.match === "regex") q = `/${q}/`;
      return { q, view: "contexts", opts: { sort: p.sort, expand: p.expand, clitic: p.clitic, dialect: p.dialect } };
    }
    case "pos": {
      const bits = [];
      if (p.surface) bits.push(p.surface);
      if (p.upos) bits.push("pos:" + p.upos);
      if (p.lemma) bits.push("lemma:" + p.lemma);
      if (p.next_surface) bits.push("next:" + p.next_surface);
      return { q: bits.join(" "), view: "contexts", opts: {} };
    }
    case "collocation": return { q: p.q, view: "collocates", opts: { window: p.window, span: p.span, measure: p.measure } };
    case "analytics": return { q: p.q, view: "distribution", opts: {} };
    case "inflection": return { q: p.word, view: "forms", opts: {} };
    case "structural": return { q: p.pattern, view: "contexts", opts: {} };
    default: return { q: p.q, view: "contexts", opts: {} };
  }
}
const VIEW_TAG = { collocates: " → collocates", distribution: " → distribution", forms: " → forms" };
async function loadExamples() {
  const box = $("#examples");
  try {
    const exs = await get("/v1/examples");
    const seen = new Set(), picks = [];
    for (const e of exs) {
      const s = exampleState(e);
      if (!s.q || seen.has(s.q + s.view)) continue;
      seen.add(s.q + s.view);
      // Annotate the runnable query with the example's human label, minus the
      // query itself when the label leads (or trails, after a colon) with it.
      const w = ((e.params || {}).q || (e.params || {}).word || (e.params || {}).surface || "").trim();
      let ann = e.label || "";
      if (w && ann.startsWith(w)) ann = ann.slice(w.length).replace(/^[-—:\s]+/, "");
      else if (w && ann.endsWith(w) && /:\s+$/.test(ann.slice(0, -w.length))) ann = ann.slice(0, -w.length).replace(/[-—:\s]+$/, "");
      // The view tag already names the view — don't repeat it in the label.
      if (ann.toLowerCase() === s.view) ann = "";
      else if (ann.toLowerCase().startsWith(s.view + " (")) ann = ann.slice(s.view.length).trim();
      picks.push({ ...s, desc: e.desc, ann });
    }
    box.innerHTML = picks.map((s, i) =>
      `<button type="button" class="ex" data-i="${i}" title="${esc(s.desc)}"><b>${esc(s.q)}${VIEW_TAG[s.view] || ""}</b>${s.ann ? `<span class="exl">${esc(s.ann)}</span>` : ""}</button>`).join("");
    box.querySelectorAll(".ex").forEach((b) => b.addEventListener("click", () => {
      const s = picks[+b.dataset.i];
      resetOptions();
      for (const [k, v] of Object.entries(s.opts || {})) if (v != null && $("#" + k)) $("#" + k).value = v;
      $("#q").value = s.q;
      setView(s.view);
      resetOffset();
      run();
    }));
  } catch (e) { /* examples are optional */ }
}
function resetOptions() {
  for (const [k, v] of Object.entries(OPT_DEFAULTS)) { const el = $("#" + k); if (el) el.value = v; }
}

// ─── token rendering (clickable + optional gloss) ───
function tokHtml(t, isNode) {
  // Homograph readings that lost the display slot (pa: head → PL / mouth). Marked
  // with a dotted underline; the full list lives in the hover tooltip.
  const alt = Array.isArray(t.alt) && t.alt.length
    ? t.alt.map((a) => [a.p, a.g].filter(Boolean).join(" ")).filter(Boolean) : null;
  const cls = "tok" + (t.cl ? " clitic" : "") + (isNode ? " node" : "") + (alt ? " has-alt" : "");
  const gloss = t.g || (t.l && t.l !== t.n ? t.l : "");
  const altLine = alt ? `<span class="alt">also: ${esc(alt.slice(0, 2).join(" · "))}${alt.length > 2 ? " …" : ""}</span>` : "";
  const gl = (t.p || gloss)
    ? `<span class="g"><span class="posline">${esc(t.p || "")}</span>${gloss ? `<span class="gl">${esc(gloss)}</span>` : ""}${altLine}</span>` : "";
  const title = [t.p, t.g, t.l && t.l !== t.n ? t.l : "", t.u && t.u !== t.p ? "raw " + t.u : "", t.x].filter(Boolean).join(" · ")
    + (alt ? `\nalso: ${alt.join(" · ")}` : "");
  return `<span class="${cls}" data-w="${esc(t.n)}" data-p="${esc(t.p||"")}" title="${esc(title)}">${esc(t.s)}${gl}</span>`;
}
function kwicTokRow(d, badge) {
  const L = (d.left||[]).map((t) => tokHtml(t, false)).join(" ");
  const N = (d.node||[]).map((t) => tokHtml(t, true)).join(" ");
  const R = (d.right||[]).map((t) => tokHtml(t, false)).join(" ");
  return `<div class="hit"><div class="kwic">
      <span class="l">${L}</span><span class="n">${N}</span><span class="r">${R}</span>
    </div><div class="meta"><span class="tr">${esc(d.translation)}</span>${badge||""}<span class="src">${src(d)}</span></div></div>`;
}
// classic string KWIC for grammar-filter results (left/node/right strings)
function kwicStrRow(d, badge) {
  return `<div class="hit"><div class="kwic">
      <span class="l">${esc(d.left)}</span><span class="n">${esc(d.node)}</span><span class="r">${esc(d.right)}</span>
    </div><div class="meta"><span class="tr">${esc(d.translation)}</span>${badge||""}<span class="src">${src(d)}</span></div></div>`;
}

function bindWordClicks() {
  document.querySelectorAll(".hits .tok, .hits .w").forEach((el) => {
    el.addEventListener("click", () => {
      const w = el.dataset.w; if (!w) return;
      $("#q").value = w;
      if (view === "distribution" || view === "forms") setView("contexts");
      resetOffset();
      run();
    });
  });
}

// ─── inline related forms (singular↔plural etc., under a word's contexts) ───
async function showInflections(word) {
  try {
    const data = await get(`/v1/inflections?word=${encodeURIComponent(word)}`);
    if (!data.forms || !data.forms.length) { $("#infl").innerHTML = ""; return; }
    // A form links lemma (e.g. rayke) ↔ surface (e.g. ronnu). Whichever side the
    // user is currently on, surface the OTHER side(s) as the clickable target so
    // you can navigate BOTH directions (rayke→ronnu AND ronnu→rayke). The fold
    // of the current query tells us which side we're on.
    const cur = data.fold;
    const fold = (s) => (s || "").normalize("NFD").replace(/[\u0300-\u036f'’ʼʻ`´]/g, "").normalize("NFC").toLowerCase();
    const targets = new Map(); // foldedTarget -> {label, rel, locus}
    for (const f of data.forms) {
      const lemF = fold(f.lemma), surF = fold(f.surface);
      // If we're on the surface, jump to the lemma (base/singular); else jump to the surface.
      const onSurface = surF === cur && lemF !== cur;
      const target = onSurface ? f.lemma : f.surface;
      const rel = onSurface ? `${f.relation} base` : f.relation;
      const key = fold(target);
      if (!key || key === cur) {
        // target folds to the current word (lemma==surface) — offer the other side.
        const other = onSurface ? f.surface : f.lemma;
        if (other && fold(other) !== cur) targets.set(fold(other), { label: other, rel: f.relation, locus: f.number_locus });
        continue;
      }
      targets.set(key, { label: target, rel, locus: f.number_locus });
    }
    if (!targets.size) { $("#infl").innerHTML = ""; return; }
    const items = [...targets.values()].map((t) =>
      `<span class="form">${esc(t.rel)}: <b data-w="${esc(t.label)}">${esc(t.label)}</b>`
      + (t.locus ? ` <span>[${esc(t.locus)}]</span>` : "") + `</span>`
    ).join("");
    $("#infl").innerHTML = `<details class="infl" open><summary>${targets.size} related form(s)</summary>${items}</details>`;
    $("#infl").querySelectorAll("b[data-w]").forEach((b) =>
      b.addEventListener("click", () => { $("#q").value = b.dataset.w; resetOffset(); run(); }));
  } catch (e) { $("#infl").innerHTML = ""; }
}

// ─── table views (collocates / distribution / forms) ───
function colTable(data) {
  if (!data.collocates || !data.collocates.length) return `<div class="empty">No collocates.</div>`;
  const head = `<tr><th>collocate</th><th>POS</th><th class="num">freq</th><th class="num">total</th>
    <th class="num">logDice</th><th class="num">t-score</th><th class="num">MI</th></tr>`;
  const rows = data.collocates.map((c) =>
    `<tr><td class="w" data-w="${esc(c.token)}">${esc(c.token)}</td><td>${c.upos?`<span class="pos-tag">${esc(c.upos)}</span>`:""}</td>
      <td class="num">${c.freq}</td><td class="num">${c.total}</td>
      <td class="num">${c.log_dice}</td><td class="num">${c.t_score}</td><td class="num">${c.mi}</td></tr>`).join("");
  return `<p class="meta">neighbours of <b>${esc(data.node)}</b> — ${data.node_freq} occurrences in ${data.corpus_tokens} tokens</p>
    <table class="data">${head}${rows}</table>`;
}
function distBlock(title, rows) {
  if (!rows || !rows.length) return "";
  const max = Math.max(...rows.map((r) => r.count));
  const body = rows.map((r) =>
    `<tr><td>${esc(r.key)}</td><td class="num">${r.count}</td>
      <td><span class="bar" style="width:${Math.round(100*r.count/max)}px"></span></td></tr>`).join("");
  return `<div><h3>${esc(title)}</h3><table class="data">${body}</table></div>`;
}
function distView(data) {
  return `<p class="meta"><b>${esc(data.node)}</b> — ${data.total} occurrences</p>
    <div class="dist-grid">
      ${distBlock("Dialect", data.dialects)}
      ${distBlock("Author", data.authors)}
      ${distBlock("Collection", data.collections)}
      ${distBlock("POS (tagger spread)", data.upos)}
    </div>`;
}
function formsView(data) {
  const forms = data.forms || [];
  if (!forms.length) return `<div class="empty">No related forms found for <b>${esc(data.query)}</b>.</div>`;
  const rows = forms.map((f) =>
    `<tr><td class="w" data-w="${esc(f.surface)}">${esc(f.surface)}</td>
      <td class="w" data-w="${esc(f.lemma)}">${esc(f.lemma)}</td>
      <td>${esc(f.relation)}</td><td>${esc(f.number_locus || "")}</td><td>${esc(f.form_length || "")}</td>
      <td>${esc(f.source || "")}</td><td class="num">${f.confidence ?? ""}</td><td>${esc(f.rule_id || "")}</td></tr>`
  ).join("");
  return `<p class="meta">Inflectional relatives of <b>${esc(data.query)}</b></p>
    <table class="data"><tr><th>surface</th><th>lemma</th><th>relation</th><th>number locus</th><th>length</th><th>source</th><th>confidence</th><th>rule</th></tr>${rows}</table>`;
}

// ─── CSV / JSON export ───
function exportRows() {
  let header, lines;
  if (view === "collocates" && lastCols) {
    header = ["collocate","upos","freq","total","log_dice","t_score","mi"];
    lines = lastCols.collocates.map((c) => [c.token,c.upos,c.freq,c.total,c.log_dice,c.t_score,c.mi]);
  } else if (view === "distribution" && lastDist) {
    header = ["facet","key","count"];
    lines = [];
    for (const [facet, rows] of [["dialect", lastDist.dialects], ["author", lastDist.authors],
                                 ["collection", lastDist.collections], ["upos", lastDist.upos]])
      for (const r of rows || []) lines.push([facet, r.key, r.count]);
  } else if (view === "forms") {
    header = ["surface","lemma","relation","number_locus","form_length","source","confidence","rule_id"];
    lines = lastRows.map((f) => [f.surface, f.lemma, f.relation, f.number_locus, f.form_length, f.source, f.confidence, f.rule_id]);
  } else if (lastKind === "kwic") {
    header = ["left","node","right","translation","dialect","author","uri"];
    lines = lastRows.map((d) => [d.left_text, d.node_text, d.right_text, d.translation, d.dialect, d.author, d.uri]);
  } else if (lastKind === "pos") {
    header = ["left","node","right","upos","lemma","translation","dialect","author","uri"];
    lines = lastRows.map((d) => [d.left, d.node, d.right, d.upos, d.lemma, d.translation, d.dialect, d.author, d.uri]);
  } else if (lastKind === "pattern") {
    header = ["left","match","right","translation","dialect","author","uri"];
    lines = lastRows.map((d) => [d.left_text, d.match_text, d.right_text, d.translation, d.dialect, d.author, d.uri]);
  } else { header = ["text","translation","dialect","author","uri"];
    lines = lastRows.map((d) => [d.text, d.translation, d.dialect, d.author, d.uri]); }
  return { header, lines };
}
function download(text, type, ext) {
  const a = document.createElement("a");
  const url = URL.createObjectURL(new Blob([text], { type }));
  a.href = url;
  a.download = `kampisos-${view === "contexts" ? lastKind : view}-${Date.now()}.${ext}`;
  a.click();
  URL.revokeObjectURL(url);
}
function toCsv() {
  const { header, lines } = exportRows();
  const q = (v) => `"${String(v ?? "").replace(/"/g, '""')}"`;
  download([header, ...lines].map((r) => r.map(q).join(",")).join("\n"), "text/csv", "csv");
}
function toJson() {
  const { header, lines } = exportRows();
  const rows = lines.map((r) => Object.fromEntries(header.map((k, i) => [k, r[i] ?? null])));
  download(JSON.stringify(rows, null, 2), "application/json", "json");
}
$("#t-csv").addEventListener("click", toCsv);
$("#t-json").addEventListener("click", toJson);
$("#t-gloss").addEventListener("click", () => {
  const on = document.body.classList.toggle("gloss");
  $("#t-gloss").setAttribute("aria-pressed", on);
});
$("#sort").addEventListener("change", () => { resetOffset(); run(); });

// Options is collapsed — echo any non-default setting on the summary line so
// a filter (e.g. dialect from an example chip) is never silently active.
function updateOptsSummary() {
  const bits = [];
  for (const [k, v] of Object.entries(OPT_DEFAULTS)) {
    if (k === "offset" || k === "sort") continue;
    const cur = ($("#" + k)?.value ?? "").trim();
    if (cur && cur !== v) bits.push(`${k}: ${cur}`);
  }
  $("#opts-summary").textContent = "Options" + (bits.length ? " · " + bits.join(" · ") : "");
}
$("#opts").addEventListener("change", updateOptsSummary);

// ─── shareable URL state (form ⇄ querystring, back/forward) ───
const OPT_DEFAULTS = { match: "fold", sort: "none", expand: "none", clitic: "any",
  measure: "log_dice", span: "both", window: "5", dialect: "", limit: "50", offset: "0" };
const URL_FIELDS = ["q", ...Object.keys(OPT_DEFAULTS)];
let suppressUrl = false;

function writeUrl() {
  const p = new URLSearchParams();
  if (view !== "contexts") p.set("view", view);
  for (const k of URL_FIELDS) {
    const v = ($("#" + k)?.value ?? "").trim();
    if (v && v !== (OPT_DEFAULTS[k] ?? "")) p.set(k, v);
  }
  const url = p.toString() ? "?" + p.toString() : location.pathname;
  if ((location.search || location.pathname) !== url) history.pushState(null, "", url);
}
function readUrl() {
  const p = new URLSearchParams(location.search);
  setView(["collocates","distribution","forms"].includes(p.get("view")) ? p.get("view") : "contexts");
  for (const k of URL_FIELDS) {
    const el = $("#" + k); if (el) el.value = p.has(k) ? p.get(k) : (OPT_DEFAULTS[k] ?? "");
  }
  return !!p.get("q");
}
window.addEventListener("popstate", () => { suppressUrl = true; readUrl(); run().finally(() => { suppressUrl = false; }); });

// ─── main run ───
async function run() {
  if (!suppressUrl) writeUrl();
  updateOptsSummary();
  const parsed = parseQuery($("#q").value);
  const { kind, q, filters } = parsed;
  lastKind = kind;
  const limit = $("#limit").value || "50";
  const dialect = filters.dialect || $("#dialect").value.trim();
  const effMatch = parsed.match || $("#match").value;
  // A regex query is KWIC-kind but not a single word: collocates/distribution/
  // forms/inflections need a concrete word, so keep it on the contexts view.
  const isWord = kind === "kwic" && !!q && effMatch !== "regex";
  // Word views only make sense for a single word; otherwise fall back to contexts.
  if (!isWord && view !== "contexts") setView("contexts");
  $("#status").textContent = q || Object.keys(filters).length ? "Searching…" : "";
  $("#hits").innerHTML = ""; $("#pager").innerHTML = ""; $("#infl").innerHTML = "";
  $("#t-csv").style.display = "none"; $("#t-json").style.display = "none";
  lastRows = []; lastCols = null; lastDist = null;
  const hasQuery = q || Object.keys(filters).some((k) => k !== "dialect");
  $("#intro").hidden = !!hasQuery;
  $("#toolbar").hidden = !hasQuery;
  $("#tabs").style.display = isWord ? "" : "none";
  // Sort + POS/gloss act on the token-grid contexts, which regex KWIC also renders.
  $("#o-sort").style.display = kind === "kwic" && !!q && view === "contexts" ? "" : "none";
  $("#t-gloss").style.display = ((kind === "kwic" && !!q) || kind === "pattern") && view === "contexts" ? "" : "none";
  if (!hasQuery) return;
  try {
    if (view === "collocates" && isWord) {
      const p = new URLSearchParams({ q, window: $("#window").value || "5",
        span: $("#span").value, measure: $("#measure").value, limit });
      if (dialect) p.set("dialect", dialect);
      lastCols = await get(`/v1/collocation?${p}`);
      $("#hits").innerHTML = colTable(lastCols);
      done(`${lastCols.collocates?.length || 0} collocates.`);
    } else if (view === "distribution" && isWord) {
      lastDist = await get(`/v1/analytics?q=${encodeURIComponent(q)}&match=${$("#match").value}&top=12`);
      $("#hits").innerHTML = distView(lastDist);
      done("");
    } else if (view === "forms" && isWord) {
      const data = await get(`/v1/inflections?word=${encodeURIComponent(q)}`);
      lastRows = data.forms || [];
      $("#hits").innerHTML = formsView(data);
      done(`${lastRows.length} related form${lastRows.length === 1 ? "" : "s"}.`);
    } else if (kind === "kwic") {
      const p = new URLSearchParams({ q, limit, offset: $("#offset").value || "0", ctx: "6",
        sort: $("#sort").value, match: effMatch,
        expand: $("#expand").value, clitic: $("#clitic").value });
      if (dialect) p.set("dialect", dialect);
      const j = await getRaw(`/v1/kwic?${p}`);
      lastRows = j.data;
      $("#hits").innerHTML = lastRows.length ? lastRows.map((d) => kwicTokRow(d)).join("") : `<div class="empty">No matches.</div>`;
      renderPager(j.meta, lastRows.length);
      done(j.meta?.total ? "" : `${lastRows.length} result${lastRows.length === 1 ? "" : "s"}.`);
      if (effMatch !== "regex") showInflections(q);
    } else if (kind === "pos") {
      const p = new URLSearchParams({ limit, window: "34" });
      if (filters.upos) p.set("upos", filters.upos.toUpperCase());
      if (filters.lemma) p.set("lemma", filters.lemma);
      if (filters.next) p.set("next_surface", filters.next);
      if (q) p.set("surface", q);
      if (dialect) p.set("dialect", dialect);
      lastRows = await get(`/v1/pos?${p}`);
      $("#hits").innerHTML = lastRows.length ? lastRows.map((d) =>
        kwicStrRow(d, d.upos ? `<span class="badge">${esc(d.upos)}${d.lemma ? " · " + esc(d.lemma) : ""}</span>` : "")
      ).join("") : `<div class="empty">No matches.</div>`;
      done(`${lastRows.length} result${lastRows.length === 1 ? "" : "s"} · ${KIND_LABEL[kind]}.`);
    } else if (kind === "pattern") {
      const p = new URLSearchParams({ pattern: q, limit });
      if (dialect) p.set("dialect", dialect);
      lastRows = await get(`/v1/structural?${p}`);
      $("#hits").innerHTML = lastRows.length ? lastRows.map((d) =>
        `<div class="hit"><div class="kwic"><span class="l">${esc(d.left_text)}</span>
          <span class="n">${(d.match||[]).map((m)=>tokHtml({s:m.s,n:m.n,p:m.p,l:m.l,cl:0},true)).join(" ")}</span>
          <span class="r">${esc(d.right_text)}</span></div>
          <div class="meta"><span class="tr">${esc(d.translation)}</span><span class="src">${src(d)}</span></div></div>`
      ).join("") : `<div class="empty">No matches.</div>`;
      done(`${lastRows.length} result${lastRows.length === 1 ? "" : "s"} · ${KIND_LABEL[kind]}.`);
    } else { // text
      lastRows = await get(`/v1/search?q=${encodeURIComponent(q)}&lang=any&limit=${encodeURIComponent(limit)}${dialect ? `&dialect=${encodeURIComponent(dialect)}` : ""}`);
      $("#hits").innerHTML = lastRows.length ? lastRows.map((d) =>
        `<div class="hit"><div class="row-sent">${esc(d.text)}</div>
          <div class="meta"><span class="tr">${esc(d.translation)}</span><span class="src">${src(d)}</span></div></div>`
      ).join("") : `<div class="empty">No matches.</div>`;
      done(`${lastRows.length} result${lastRows.length === 1 ? "" : "s"} · ${KIND_LABEL[kind]}.`);
    }
    bindWordClicks();
    const canExport = (lastRows.length || lastCols?.collocates?.length || lastDist?.total) ? "" : "none";
    $("#t-csv").style.display = canExport; $("#t-json").style.display = canExport;
  } catch (e) {
    done("Error — " + e.message);
  }
}
$("#f").addEventListener("submit", (e) => { e.preventDefault(); resetOffset(); run(); });

// Restore from a shared/bookmarked URL, else show the empty state.
loadExamples();
if (readUrl()) { suppressUrl = true; run().finally(() => { suppressUrl = false; }); }
</script>
</body>
</html>
